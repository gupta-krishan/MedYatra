<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-label="MedYatra — India's Medical Tourism Guide">
<title>MedYatra</title>
<desc>MedYatra logo — India's Medical Tourism Guide</desc>

<!-- Icon mark: layered circles with medical cross and leaf -->
<circle cx="30" cy="30" r="28" fill="#2fa866"/>
<circle cx="30" cy="30" r="20" fill="#1a7244"/>
<!-- Medical cross -->
<rect x="25" y="16" width="10" height="28" rx="2" fill="#ffffff"/>
<rect x="16" y="25" width="28" height="10" rx="2" fill="#ffffff"/>
<!-- Leaf accent top-right -->
<ellipse cx="43" cy="11" rx="5.5" ry="8.5" fill="#6dc799" transform="rotate(-35 43 11)"/>

<!-- Wordmark -->
<text x="68" y="34"
  font-family="Georgia,'Times New Roman',serif"
  font-size="28"
  font-weight="700"
  fill="#0e4a2c"
  letter-spacing="-0.3">Med</text>
<text x="120" y="34"
  font-family="Georgia,'Times New Roman',serif"
  font-size="28"
  font-weight="700"
  fill="#2fa866"
  letter-spacing="-0.3">Yatra</text>

<!-- Tagline -->
<circle cx="62" cy="45" r="2.5" fill="#2fa866"/>
<text x="68" y="49"
  font-family="'Helvetica Neue',Arial,Helvetica,sans-serif"
  font-size="9.5"
  fill="#6b8278"
  letter-spacing="0.05em">India's Medical Tourism Guide</text>
</svg>
